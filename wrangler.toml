# ==========================================================
# Cloudflare Worker Configuration for Supplement Intelligence
# ==========================================================
# This file configures the Cloudflare Worker deployment settings.
#
# IMPORTANT: Before deploying, you need to:
# 1. Log in with: wrangler login
# 2. Or set environment variables:
#    - CLOUDFLARE_API_TOKEN
#    - CLOUDFLARE_ACCOUNT_ID
# ==========================================================

# Worker name
name = "supplementintel-products"

# Entry point - the main JavaScript file for the worker
main = "worker.js"

# Compatibility date - determines which runtime features are available
compatibility_date = "2024-01-01"

# Account ID - Set via CLOUDFLARE_ACCOUNT_ID environment variable
# Or replace with your actual Cloudflare Account ID
account_id = "995701aa11a6ea4fbf3ca3aba6eb8e1a"

# ==========================================================
# Route Configuration
# ==========================================================
# These routes determine which URLs this worker handles.
# The worker will intercept requests matching these patterns.

[[routes]]
pattern = "supplement-intelligence.com/*"
zone_name = "supplement-intelligence.com"

[[routes]]
pattern = "www.supplement-intelligence.com/*"
zone_name = "supplement-intelligence.com"

# ==========================================================
# Development Settings
# ==========================================================

# Enable local development with: wrangler dev
[dev]
port = 8787
local_protocol = "http"
