name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
    paths:
      - 'worker.js'
      - 'wrangler.toml'
      - '.github/workflows/deploy-cloudflare-worker.yml'
      - 'database/**'
      - 'database-data/**'
      - 'schema/**'
      - 'sitemap.xml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Workers
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify deployment
        run: |
          echo "Waiting for deployment to propagate..."
          sleep 10
          for url in "/database" "/database/ashwagandha-studies" "/database/berberine-studies" "/database/nac-studies"; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://www.supplement-intelligence.com$url")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ $url (HTTP $HTTP_CODE)"
            else
              echo "❌ $url (HTTP $HTTP_CODE)"
            fi
          done
